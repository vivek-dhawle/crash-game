<!doctype html>
<html lang="en" class="h-full bg-[#070f1f]">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thief Crash</title>
  </head>

  <body class="h-full text-white overflow-hidden">
    <div id="app" class="h-full w-full flex flex-col">
      <!-- HEADER -->
      <header
        class="h-14 px-4 flex items-center justify-between bg-gradient-to-r from-[#0d1b3a] to-[#09122b] border-b border-blue-500/20"
      >
        <h1 class="text-blue-400 font-semibold text-sm tracking-wide">THIEF CRASH</h1>
      </header>

      <!-- MAIN -->
      <div class="flex-1 flex flex-col-reverse lg:flex-row overflow-hidden">
        <!-- BET PANEL -->
        <div
          class="w-full lg:w-[380px] xl:w-[380px] bg-gradient-to-b from-[#0c1633] to-[#081027] border-t lg:border-t-0 lg:border-r border-blue-500/20 backdrop-blur-xl"
        >
          <div class="p-5">
            <div class="bg-[#0a132a] rounded-2xl p-5 shadow-lg shadow-blue-900/40 border border-blue-500/20">
              <h2 class="text-blue-400 text-sm tracking-wide mb-4">PLACE BET</h2>

              <!-- BET AMOUNT -->
              <div class="mb-4">
                <label class="text-xs text-gray-400">Bet Amount</label>
                <div class="mt-2 flex items-center bg-[#060d1d] rounded-xl border border-blue-500/30 px-3 py-3">
                  <span class="text-gray-400 mr-2">$</span>
                  <input
                    id="bet-amount"
                    type="number"
                    value="1"
                    class="w-full bg-transparent outline-none text-lg font-semibold text-white"
                  />
                </div>
              </div>

              <!-- AUTO CASHOUT -->
              <div class="mb-5">
                <label class="text-xs text-gray-400">Auto Cashout (x)</label>
                <div class="mt-2 flex items-center bg-[#060d1d] rounded-xl border border-blue-500/30 px-3 py-3">
                  <input
                    id="auto-cashout"
                    type="number"
                    step="0.01"
                    value="2.00"
                    class="w-full bg-transparent outline-none text-lg font-semibold text-cyan-400"
                  />
                  <span class="text-gray-400 ml-2">x</span>
                </div>
              </div>

              <!-- BUTTONS -->

              <!-- Place Bet -->
              <button
                id="place-bet-btn"
                class="w-full py-3 rounded-xl font-semibold text-lg transition bg-gradient-to-r from-blue-500 to-cyan-500 hover:scale-[1.02]"
              >
                Place Bet
              </button>

              <!-- Cancel Bet -->
              <button
                id="cancel-bet-btn"
                class="w-full py-3 rounded-xl font-semibold text-lg transition bg-gradient-to-r from-red-500 to-pink-500 hover:scale-[1.02] hidden"
              >
                Cancel Bet
              </button>

              <!-- Place Next Round -->
              <button
                id="place-next-btn"
                class="w-full py-3 rounded-xl font-semibold text-lg transition bg-gradient-to-r from-blue-500 to-cyan-500 hover:scale-[1.02] hidden"
              >
                Place Bet Next Round
              </button>

              <!-- Cancel Next Round -->
              <button
                id="cancel-next-btn"
                class="w-full py-3 rounded-xl font-semibold text-lg transition bg-gradient-to-r from-red-500 to-pink-500 hover:scale-[1.02] hidden"
              >
                Cancel Next Round
              </button>

              <!-- Cashout -->
              <button
                id="cashout-btn"
                class="w-full py-3 rounded-xl font-semibold text-lg transition bg-gradient-to-r from-green-500 to-emerald-400 hover:scale-[1.02] hidden"
              >
                Cash Out
              </button>
            </div>
          </div>
        </div>

        <!-- GAME CANVAS -->
        <div class="flex-1 min-h-0 relative bg-[#0f172a] flex items-center justify-center">
          <div id="pixi-container" class="w-full h-full"></div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/app/index.ts"></script>
  </body>
</html>
